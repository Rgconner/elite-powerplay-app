services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: elite_powerplay
      POSTGRES_USER: pp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pp_password}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pp_user -d elite_powerplay"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend: FastAPI + uvicorn ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pp_user:${POSTGRES_PASSWORD:-pp_password}@postgres:5432/elite_powerplay
    depends_on:
      postgres:
        condition: service_healthy
    # Backend is only reachable from within the compose network.
    # The frontend Nginx container proxies /api → backend:8000.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend: Nginx serving the Vite build ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
    driver: local
