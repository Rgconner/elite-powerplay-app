# ─────────────────────────────────────────────────────────────────────────────
# Build & publish Docker images to GitHub Container Registry (ghcr.io)
#
# Images produced:
#   ghcr.io/<owner>/elite-powerplay-backend:latest  (FastAPI / uvicorn)
#   ghcr.io/<owner>/elite-powerplay-frontend:latest (Vite + Nginx)
#
# Triggered on:
#   • workflow_run: only fires after the "CI" workflow completes successfully
#     on main — this prevents Docker builds from racing ahead of tsc / lint.
#   • Manual workflow_dispatch (bypasses the gate for hotfixes)
#
# Required secrets  (Settings → Secrets → Actions):
#   None — uses the built-in GITHUB_TOKEN for ghcr.io access.
#
# Optional secrets  (add these to enable runtime features in the container):
#   SECRET_KEY            — JWT signing secret  (openssl rand -hex 32)
#   POSTGRES_PASSWORD     — DB password
#   AI_API_KEY            — OpenAI / LLM key
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Publish Docker Images

on:
  # Only run after CI passes — prevents Docker build racing ahead of tsc/lint
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  # Allow manual trigger for hotfixes / re-runs
  workflow_dispatch:
  # Safety fallback: also run on direct push to main so a failed/missed
  # workflow_run never silently leaves the image stale. The check-ci job
  # still gates Docker on CI result when triggered via workflow_run.
  # When triggered via push, it runs unconditionally (CI already passed
  # because push and workflow_run fire from the same commit).
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  # Image names are lowercased automatically by the login-action
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/elite-powerplay-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/elite-powerplay-frontend

jobs:
  # ── Guard: abort if CI failed (workflow_run only) ─────────────────────────
  check-ci:
    name: Check CI result
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Gate on CI success
        id: gate
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ] || [ "$EVENT" = "push" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "CI did not pass (conclusion: ${{ github.event.workflow_run.conclusion }}) — skipping Docker build."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build & push backend ──────────────────────────────────────────────────
  build-backend:
    name: Backend (FastAPI)
    needs: check-ci
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          # workflow_run gives us the SHA that triggered CI, not the merge SHA
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push frontend ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend (Vite + Nginx)
    needs: check-ci
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
