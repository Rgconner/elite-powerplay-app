# ─────────────────────────────────────────────────────────────────────────────
# frontend.yaml  —  Nginx / Vite Deployment + Service
#
# Image: ghcr.io/rgconner/elite-powerplay-frontend:latest
#
# The Nginx container serves the pre-built React SPA and proxies /api/* to
# the backend ClusterIP service on port 8000.  The proxy target is baked into
# the image's nginx.conf (http://backend:8000/api/).  Because both pods live in
# the same namespace, the DNS name "backend" resolves automatically.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: elite-powerplay
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/rgconner/elite-powerplay-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---

# ── Service ───────────────────────────────────────────────────────────────────
# Default: ClusterIP — sufficient when using a Cloudflare Tunnel or an
# nginx-ingress Ingress controller.  The tunnel reaches the service by its
# cluster-internal DNS name (http://frontend:80).
#
# If you need direct external access without a tunnel / ingress controller,
# change type to LoadBalancer and remove the Cloudflare tunnel deployment.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: frontend
  type: ClusterIP          # ← change to LoadBalancer if not using CF tunnel
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
