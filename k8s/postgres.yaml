# ─────────────────────────────────────────────────────────────────────────────
# postgres.yaml  —  PostgreSQL StatefulSet + Service
#
# Uses a PersistentVolumeClaim for durable data storage.
# The postgres-password is injected from the Secret; the database name and
# user are pulled from the ConfigMap.
#
# Tier 4 of the QueuePool fix: a custom postgresql.conf (from
# postgres-config.yaml) is mounted and selected via
# `args: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]`.
# This gives us statement_timeout, idle_in_transaction_session_timeout, and
# max_connections=200 — none of which the upstream alpine image sets.
# ─────────────────────────────────────────────────────────────────────────────

# ── Persistent storage ────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard   # uncomment and set for your cluster's class

---

# ── StatefulSet ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: elite-powerplay
        app.kubernetes.io/component: database
    spec:
      terminationGracePeriodSeconds: 60

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          env:
            # Database name and user come from the ConfigMap
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: POSTGRES_USER
            # Password comes from the Secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elite-powerplay-secrets
                  key: postgres-password

          # Override the entrypoint to load our custom postgresql.conf.
          # Without this, postgres reads the upstream alpine image's
          # stock config (max_connections=100, no timeouts, etc.).
          args:
            - postgres
            - -c
            - config_file=/etc/postgresql/postgresql.conf

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            # Custom config file (mounted read-only via subPath)
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
              readOnly: true

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        # Custom postgresql.conf (see postgres-config.yaml)
        - name: postgres-config
          configMap:
            name: postgres-config
            items:
              - key: postgresql.conf
                path: postgresql.conf

---

# ── Headless Service (stable DNS for StatefulSet) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: database
spec:
  selector:
    app: postgres
  clusterIP: None          # headless — StatefulSet resolves as postgres.elite-powerplay.svc
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
