# ─────────────────────────────────────────────────────────────────────────────
# cloudflare-tunnel-secrets.yaml  —  TEMPLATE  (never commit real values)
#
# HOW TO USE
# ----------
# 1. Create the tunnel and download the credentials file:
#      cloudflared tunnel create elite-powerplay
#      # This writes: ~/.cloudflared/<TUNNEL-ID>.json
#
# 2. Copy this template:
#      cp k8s/cloudflare-tunnel-secrets.yaml k8s/cloudflare-tunnel-secrets.local.yaml
#
# 3. Base64-encode the entire credentials JSON file (one line, no newline):
#      base64 -w0 ~/.cloudflared/<TUNNEL-ID>.json
#    Paste the output as the value of "tunnel-credentials" below.
#
# 4. Apply to the cluster:
#      kubectl apply -f k8s/cloudflare-tunnel-secrets.local.yaml
#
# 5. NEVER commit cloudflare-tunnel-secrets.local.yaml — it is git-ignored.
#
# WHAT IS INSIDE THE CREDENTIALS FILE
# ------------------------------------
# The JSON file contains the tunnel's private key.  Whoever holds this file
# can send traffic through your tunnel.  Treat it like a password.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-secrets
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: cloudflare-tunnel
type: Opaque
data:
  # base64 -w0 ~/.cloudflared/<TUNNEL-ID>.json
  tunnel-credentials: <base64-encoded-tunnel-credentials-json>
