# ─────────────────────────────────────────────────────────────────────────────
# secrets.yaml  —  TEMPLATE  (never commit real values)
#
# HOW TO USE
# ----------
# 1. Copy this file:
#      cp k8s/secrets.yaml k8s/secrets.local.yaml
#
# 2. Edit k8s/secrets.local.yaml — replace every <base64-…> placeholder with
#    the real base64-encoded value:
#      echo -n 'your-value' | base64
#
# 3. Apply to the cluster:
#      kubectl apply -f k8s/secrets.local.yaml
#
# 4. NEVER commit secrets.local.yaml — it is already in .gitignore.
#
# KEY DESCRIPTIONS
# ----------------
#   postgres-password   Password for the pp_user PostgreSQL account.
#                       Generate a strong one: openssl rand -hex 16
#
#   secret-key          JWT signing secret for the admin API.
#                       Generate: openssl rand -hex 32
#
#   database-url        Full PostgreSQL DSN.  Must match postgres-password.
#                       postgresql://pp_user:<password>@postgres:5432/elite_powerplay
#
#   ai-api-key          OpenAI (or compatible) API key.
#                       Leave as the placeholder if LLM_ENABLED=false.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: elite-powerplay-secrets
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
type: Opaque
data:
  # echo -n 'yourpassword' | base64
  postgres-password: <base64-encoded-postgres-password>

  # echo -n 'your-jwt-secret' | base64   (openssl rand -hex 32)
  secret-key: <base64-encoded-secret-key>

  # echo -n 'postgresql://pp_user:yourpassword@postgres:5432/elite_powerplay' | base64
  database-url: <base64-encoded-database-url>

  # echo -n 'sk-...' | base64   (leave placeholder if LLM disabled)
  ai-api-key: <base64-encoded-ai-api-key>
