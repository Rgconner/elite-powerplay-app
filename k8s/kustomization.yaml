# ─────────────────────────────────────────────────────────────────────────────
# kustomization.yaml  —  Kustomize entry point
#
# Apply everything in one command:
#   kubectl apply -k k8s/
#
# Or with Kustomize directly:
#   kustomize build k8s/ | kubectl apply -f -
#
# NOTE: Apply secrets.local.yaml separately (it is not listed here so you
#       never accidentally commit real credentials):
#   kubectl apply -f k8s/secrets.local.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: elite-powerplay

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres-config.yaml   # Tier 4 — custom postgresql.conf for the QueuePool fix
  - postgres.yaml
  - backend.yaml
  - frontend.yaml
  - image-updater.yaml
  # ── Choose ONE ingress method ─────────────────────────────────────────────
  # Option A: Cloudflare Tunnel (recommended — no LoadBalancer / open ports)
  - cloudflare-tunnel.yaml
  # Option B: nginx-ingress controller
  # - ingress.yaml

# ── Image tags ────────────────────────────────────────────────────────────────
# Override the :latest tag here to pin to a specific build SHA.
# Get the SHA from: ghcr.io/rgconner/elite-powerplay-backend and
#                   ghcr.io/rgconner/elite-powerplay-frontend
# Example:
#   images:
#     - name: ghcr.io/rgconner/elite-powerplay-backend
#       newTag: sha-5483e57
#     - name: ghcr.io/rgconner/elite-powerplay-frontend
#       newTag: sha-5483e57
images:
  - name: ghcr.io/rgconner/elite-powerplay-backend
    newTag: latest
  - name: ghcr.io/rgconner/elite-powerplay-frontend
    newTag: latest
  # image-updater pulls its own image from the registry at runtime — no
  # override needed; the controller itself owns its update cycle.
  - name: ghcr.io/rgconner/elite-powerplay-image-updater
    newTag: latest
