# ─────────────────────────────────────────────────────────────────────────────
# backend.yaml  —  FastAPI / uvicorn Deployment + Service
#
# Image: ghcr.io/rgconner/elite-powerplay-backend:latest
# All sensitive values come from the Secret; non-secret config from ConfigMap.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  # Recreate is safer for a single-replica app that writes to Postgres on start
  # (avoids two pods running migrations simultaneously).
  # Switch to RollingUpdate once the app supports concurrent instances.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: elite-powerplay
        app.kubernetes.io/component: backend
    spec:
      # Wait for Postgres to be ready before starting the backend
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U $(POSTGRES_USER) -d $(POSTGRES_DB); do
                echo "Waiting for postgres…"; sleep 2;
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: POSTGRES_DB

      containers:
        - name: backend
          # Pin to a specific sha tag in production; use :latest for dev.
          image: ghcr.io/rgconner/elite-powerplay-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            # ── From Secret ────────────────────────────────────────────────────
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: elite-powerplay-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: elite-powerplay-secrets
                  key: secret-key
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: elite-powerplay-secrets
                  key: ai-api-key

            # ── From ConfigMap ─────────────────────────────────────────────────
            - name: LLM_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: LLM_ENABLED
            - name: AI_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: AI_PROVIDER
            - name: SPANSH_INGEST_INTERVAL_HOURS
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: SPANSH_INGEST_INTERVAL_HOURS
            - name: EDSM_SYNC_INTERVAL_HOURS
              valueFrom:
                configMapKeyRef:
                  name: elite-powerplay-config
                  key: EDSM_SYNC_INTERVAL_HOURS

            # ── DB pool tuning (Tier 1+2 of the QueuePool fix) ────────────────
            # All values are read by db/session.py; defaults are baked into the
            # code so this section is optional.  Listed here so the tuning is
            # explicit and discoverable in `kubectl describe deploy backend`.
            # See k8s/postgres-config.yaml for the matching Postgres-side
            # timeouts (statement_timeout, idle_in_transaction_session_timeout).
            - name: DB_POOL_SIZE
              value: "10"               # was SQLAlchemy default 5
            - name: DB_MAX_OVERFLOW
              value: "20"               # was 10  (total 30 per pod)
            - name: DB_POOL_TIMEOUT
              value: "10"               # was 30 (fail fast under burst)
            - name: DB_POOL_RECYCLE
              value: "1800"             # NEW  — recycle every 30 min
            - name: DB_POOL_PRE_PING
              value: "true"             # NEW  — detect dead conns
            # Ingest uses a SEPARATE pool (db.session.IngestSessionLocal) so a
            # 5–10 min Spansh ingest cannot starve the web request pool above.
            - name: DB_INGEST_POOL_SIZE
              value: "2"
            - name: DB_INGEST_MAX_OVERFLOW
              value: "0"
            - name: DB_INGEST_POOL_TIMEOUT
              value: "60"
            - name: DB_INGEST_POOL_RECYCLE
              value: "1800"
            - name: DB_INGEST_POOL_PRE_PING
              value: "true"

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "768Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

---

# ── ClusterIP Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: elite-powerplay
  labels:
    app.kubernetes.io/name: elite-powerplay
    app.kubernetes.io/component: backend
spec:
  selector:
    app: backend
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
